<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOU HAVE BEEN GORKED</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: black;
      color: red;
      overflow: hidden;
      font-family: Impact, Helvetica, sans-serif;
    }

    h1 {
      position: fixed;
      left: 50%;
      top: 50%;

      margin: 0;
      font-size: clamp(4rem, 16vw, 14rem);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;

      text-shadow:
        4px 4px 0 #5c0000,
        -4px -4px 0 #ff3b3b,
        0 0 25px red;

      animation:
        aggressiveMove 1.2s infinite steps(2, end),
        shake 0.08s infinite linear,
        glitch 0.3s infinite steps(2, end);
    }

    @keyframes aggressiveMove {
      0% {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) rotate(0deg) scale(1);
      }

      10% {
        left: 15%;
        top: 20%;
        transform: translate(-50%, -50%) rotate(-12deg) scale(1.1);
      }

      20% {
        left: 85%;
        top: 30%;
        transform: translate(-50%, -50%) rotate(9deg) scale(0.9);
      }

      30% {
        left: 30%;
        top: 80%;
        transform: translate(-50%, -50%) rotate(16deg) scale(1.2);
      }

      40% {
        left: 70%;
        top: 15%;
        transform: translate(-50%, -50%) rotate(-18deg) scale(1);
      }

      50% {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) rotate(4deg) scale(1.3);
      }

      60% {
        left: 10%;
        top: 65%;
        transform: translate(-50%, -50%) rotate(-8deg) scale(0.95);
      }

      70% {
        left: 90%;
        top: 75%;
        transform: translate(-50%, -50%) rotate(20deg) scale(1.15);
      }

      80% {
        left: 25%;
        top: 40%;
        transform: translate(-50%, -50%) rotate(-20deg) scale(1.05);
      }

      90% {
        left: 75%;
        top: 55%;
        transform: translate(-50%, -50%) rotate(12deg) scale(0.85);
      }

      100% {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) rotate(0deg) scale(1);
      }
    }

    @keyframes shake {
      0% {
        margin-left: 0;
        margin-top: 0;
      }

      25% {
        margin-left: 8px;
        margin-top: -6px;
      }

      50% {
        margin-left: -10px;
        margin-top: 7px;
      }

      75% {
        margin-left: 6px;
        margin-top: 10px;
      }

      100% {
        margin-left: -7px;
        margin-top: -8px;
      }
    }

    @keyframes glitch {
      0% {
        text-shadow:
          4px 4px 0 #5c0000,
          -4px -4px 0 #ff3b3b,
          0 0 25px red;
      }

      50% {
        text-shadow:
          -8px 2px 0 #5c0000,
          8px -2px 0 #ff3b3b,
          0 0 40px red;
      }

      100% {
        text-shadow:
          6px -6px 0 #5c0000,
          -6px 6px 0 #ff3b3b,
          0 0 30px red;
      }
    }
  </style>
</head>

<body>
  <h1>YOU HAVE BEEN GORKED</h1>
</body>
</html>
